version: 2
updates:
  # Dependencias npm via pnpm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Santiago'
    open-pull-requests-limit: 5
    groups:
      # Agrupa minor + patch para reducir ruido de PRs
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Next 16 es breaking — la subida mayor se decide manualmente.
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-config-next'
        update-types: ['version-update:semver-major']
      # React 19 idem.
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'deps'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'America/Santiago'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
