name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores del mismo branch al pushear nuevamente.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10
  NODE_VERSION: 22

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: TypeScript typecheck (build)
        # `next build` corre tsc + lint + bundle. Si tsc falla, el job falla.
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - name: Bundle size budget
        # Falla si el bundle excede el budget (3500 kB total / 600 kB largest).
        # Override con BUDGET_KB_TOTAL / BUDGET_KB_FIRST si el aumento es justificado.
        run: pnpm check:bundle-size

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest run
        run: pnpm test:run

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm test:e2e:install
      - name: Build for production
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - name: Run Playwright
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  perf-audit:
    name: Perf budget (Web Vitals)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm test:e2e:install
      - name: Build for production
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - name: Perf audit (CWV budget)
        # Levanta el server prod y mide FCP/LCP/CLS en 4 rutas.
        # Falla si excede budgets (default: FCP <1500ms, LCP <2000ms, CLS <0.1).
        # Override con BUDGET_FCP_MS / BUDGET_LCP_MS / BUDGET_CLS / BUDGET_JS_KB.
        run: pnpm perf:audit:ci
